services:
  postgres:
    image: postgres:15-alpine
    container_name: narayana-postgres
    environment:
      POSTGRES_USER: narayana
      POSTGRES_PASSWORD: narayana
      POSTGRES_DB: narayana
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narayana"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./db/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://narayana:narayana@postgres:5432/narayana?sslmode=disable",
        "up"
      ]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/api"]
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://narayana:narayana@postgres:5432/narayana?sslmode=disable
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/worker"]
    ports:
      - "8081:8081"
      - "9090:9090"
    environment:
      - DATABASE_URL=postgres://narayana:narayana@postgres:5432/narayana?sslmode=disable
      - HEALTH_PORT=8081
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  pgdata:
