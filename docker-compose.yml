services:
  postgres:
    image: postgres:15-alpine
    container_name: narayana-postgres
    environment:
      POSTGRES_USER: narayana
      POSTGRES_PASSWORD: narayana
      POSTGRES_DB: narayana
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narayana"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
